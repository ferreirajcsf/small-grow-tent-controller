# ══════════════════════════════════════════════════════════════════
#  Grow Tent Controller  —  Suggested Dashboard
#  Design philosophy:
#    • Status-first: what's happening RIGHT NOW is always visible
#    • Progressive depth: readings → targets → controls → config
#    • One-column inner grids for visual consistency
#    • Every row divides into exactly 3 equal columns
# ══════════════════════════════════════════════════════════════════
#
# Dependencies: layout-card, Mushroom cards, card-mod, fold-entity-row
# Entity IDs to update: switch.lightgrowtent, switch.heatergrowtent,
#   switch.circulationgrowtent, switch.exhaustgrowtent,
#   switch.humidifiergrowtent, switch.dehumidifiergrowtent,
#   sensor.canopy_temperature, sensor.top_temperature,
#   sensor.canopy_humidity, sensor.top_humidity

title: Grow Tent
views:

  # ════════════════════════════════════════════════════════════════
  #  VIEW 1 — STATUS  (default view, daily use)
  #  Everything a grower needs to glance at every day
  # ════════════════════════════════════════════════════════════════
  - title: Status
    path: grow-tent
    icon: mdi:sprout
    cards:
      - type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: 1fr 1fr 1fr
          grid-template-areas: |
            "hero   hero   hero  "
            "vpd    temp   rh    "
            "trend  trend  trend "
            "cycle  cycle  cycle "
          grid-column-gap: 12px
          grid-row-gap: 12px
          grid-auto-rows: auto
        cards:

          # ── HERO: Controller state + mode ────────────────────────
          - type: vertical-stack
            view_layout:
              grid-area: hero
            cards:
              - type: custom:mushroom-template-card
                primary: >
                  {% set m = states('sensor.control_mode') %}
                  {% set map = {
                    'vpd_chase': 'Running — VPD Chase',
                    'drying_hard_limits_only': 'Drying Mode',
                    'disabled': 'Controller Off',
                    'waiting_for_sensors': 'Waiting for Sensors',
                    'init': 'Starting Up',
                    'night_on_dewpoint_protect': 'Night — Dew-point Protection',
                    'night_auto_dewpoint_protect': 'Night — Dew-point Protection',
                    'hard_limit:temp_below_min': 'Alert — Temperature Too Low',
                    'hard_limit:temp_above_max': 'Alert — Temperature Too High',
                    'hard_limit:rh_below_min': 'Alert — Humidity Too Low',
                    'hard_limit:rh_above_max': 'Alert — Humidity Too High',
                    'safety_trip:heater_max_run': 'Safety Trip — Heater Max Run'
                  } %}
                  {{ map.get(m, m | replace('_',' ') | title) }}
                secondary: >
                  Stage: {{ states('select.stage') }} •
                  Day {{ states('sensor.grow_days_since_germination') }} •
                  {{ states('sensor.grow_days_until_harvest') }} days to harvest
                icon: >
                  {% set m = states('sensor.control_mode') %}
                  {% if m == 'vpd_chase' %} mdi:leaf-circle
                  {% elif m.startswith('hard_limit:') or m.startswith('safety_trip:') %} mdi:alert-circle
                  {% elif m.startswith('night_') %} mdi:weather-night
                  {% elif m == 'drying_hard_limits_only' %} mdi:hair-dryer
                  {% elif m == 'disabled' %} mdi:pause-circle
                  {% else %} mdi:clock-outline {% endif %}
                icon_color: >
                  {% set m = states('sensor.control_mode') %}
                  {% if m == 'vpd_chase' %} green
                  {% elif m.startswith('hard_limit:') or m.startswith('safety_trip:') %} red
                  {% elif m.startswith('night_') %} indigo
                  {% elif m == 'drying_hard_limits_only' %} orange
                  {% else %} grey {% endif %}
                layout: horizontal
                tap_action:
                  action: call-service
                  service: switch.toggle
                  target:
                    entity_id: switch.controller
                card_mod:
                  style: |
                    ha-card {
                      font-size: 1.1em;
                      padding: 16px !important;
                    }

          # ── VPD tile ─────────────────────────────────────────────
          - type: vertical-stack
            view_layout:
              grid-area: vpd
            cards:
              - type: custom:mushroom-title-card
                title: VPD
                subtitle: Vapour Pressure Deficit
                alignment: center
              - type: custom:mushroom-entity-card
                entity: sensor.vpd
                name: Live VPD
                icon: mdi:gauge
                fill_container: true
              - type: custom:mushroom-entity-card
                entity: number.small_grow_tent_controller_vpd_target
                name: Target VPD
                icon: mdi:gauge-empty
                fill_container: true

          # ── Temperature tile ──────────────────────────────────────
          - type: vertical-stack
            view_layout:
              grid-area: temp
            cards:
              - type: custom:mushroom-title-card
                title: Temperature
                subtitle: Canopy readings
                alignment: center
              - type: custom:mushroom-entity-card
                entity: sensor.average_temperature
                name: Average
                icon: mdi:thermometer
                fill_container: true
              - type: custom:mushroom-entity-card
                entity: sensor.canopy_temperature
                name: Canopy
                icon: mdi:thermometer-low
                fill_container: true
              - type: custom:mushroom-entity-card
                entity: sensor.top_temperature
                name: Top
                icon: mdi:thermometer-high
                fill_container: true

          # ── Humidity tile ─────────────────────────────────────────
          - type: vertical-stack
            view_layout:
              grid-area: rh
            cards:
              - type: custom:mushroom-title-card
                title: Humidity
                subtitle: Relative humidity
                alignment: center
              - type: custom:mushroom-entity-card
                entity: sensor.average_humidity
                name: Average
                icon: mdi:water-percent
                fill_container: true
              - type: custom:mushroom-entity-card
                entity: sensor.canopy_humidity
                name: Canopy
                icon: mdi:water-percent
                fill_container: true
              - type: custom:mushroom-entity-card
                entity: sensor.top_humidity
                name: Top
                icon: mdi:water-percent
                fill_container: true

          # ── Trend graphs ──────────────────────────────────────────
          - type: horizontal-stack
            view_layout:
              grid-area: trend
            cards:
              - type: history-graph
                title: Temperature (24h)
                hours_to_show: 24
                entities:
                  - entity: sensor.average_temperature
                    name: Avg
                  - entity: sensor.canopy_temperature
                    name: Canopy
                  - entity: sensor.top_temperature
                    name: Top
              - type: history-graph
                title: Humidity (24h)
                hours_to_show: 24
                entities:
                  - entity: sensor.average_humidity
                    name: Avg
                  - entity: sensor.canopy_humidity
                    name: Canopy
                  - entity: sensor.top_humidity
                    name: Top
              - type: history-graph
                title: VPD (24h)
                hours_to_show: 24
                entities:
                  - entity: sensor.vpd
                    name: VPD

          # ── Grow Cycle + Journal ─────────────────────────────────
          - type: vertical-stack
            view_layout:
              grid-area: cycle
            cards:
              - type: custom:mushroom-title-card
                title: Grow Cycle
                subtitle: Dates + progress
                alignment: center
              - type: custom:layout-card
                layout_type: grid
                layout:
                  grid-template-columns: repeat(6, 1fr)
                  grid-auto-rows: 100px
                  grid-column-gap: 8px
                  grid-row-gap: 8px
                cards:
                  - type: custom:mushroom-entity-card
                    entity: input_datetime.grow_germination_date
                    name: Germination
                    icon: mdi:seed
                    fill_container: true
                  - type: custom:mushroom-number-card
                    entity: input_number.grow_plant_count
                    name: Plants
                    icon: mdi:sprout
                    display_mode: buttons
                    fill_container: true
                  - type: custom:mushroom-entity-card
                    entity: input_datetime.grow_flowering_start_date
                    name: Flower Start
                    icon: mdi:flower-outline
                    fill_container: true
                  - type: custom:mushroom-entity-card
                    entity: sensor.grow_days_since_germination
                    name: Since Germ
                    icon: mdi:timer-sand
                    fill_container: true
                  - type: custom:mushroom-number-card
                    entity: input_number.grow_total_flower_days
                    name: Flower Days
                    icon: mdi:calendar-range
                    display_mode: buttons
                    fill_container: true
                  - type: custom:mushroom-entity-card
                    entity: sensor.grow_days_until_harvest
                    name: To Harvest
                    icon: mdi:calendar-end
                    fill_container: true

              # ── Grow Journal ──────────────────────────────────────────
              - type: custom:mushroom-title-card
                title: Grow Journal
                subtitle: Timestamped notes for this grow
                alignment: center
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-entity-card
                    entity: sensor.small_grow_tent_controller_grow_journal
                    name: Notes recorded
                    icon: mdi:notebook-edit-outline
                    fill_container: true
                  - type: custom:mushroom-entity-card
                    entity: button.small_grow_tent_controller_clear_last_note
                    name: Clear Last
                    icon: mdi:notebook-minus-outline
                    tap_action:
                      action: call-service
                      service: button.press
                      target:
                        entity_id: button.small_grow_tent_controller_clear_last_note
                    fill_container: true
                  - type: custom:mushroom-entity-card
                    entity: button.small_grow_tent_controller_clear_all_notes
                    name: Clear All
                    icon: mdi:notebook-remove-outline
                    tap_action:
                      action: call-service
                      service: button.press
                      target:
                        entity_id: button.small_grow_tent_controller_clear_all_notes
                    fill_container: true

              # ── Add note input ────────────────────────────────────────
              # Requires a helper: Settings → Helpers → Text, named "Grow Note Input"
              # entity_id will be input_text.grow_note_input
              - type: horizontal-stack
                cards:
                  - type: entities
                    entities:
                      - entity: input_text.grow_note_input
                        name: New note
                  - type: custom:mushroom-template-card
                    primary: Add Note
                    icon: mdi:plus-circle-outline
                    icon_color: green
                    fill_container: false
                    tap_action:
                      action: call-service
                      service: small_grow_tent_controller.add_note
                      service_data:
                        text: "{{ states('input_text.grow_note_input') }}"
                    hold_action:
                      action: call-service
                      service: input_text.set_value
                      target:
                        entity_id: input_text.grow_note_input
                      service_data:
                        value: ""
                    card_mod:
                      style: >
                        ha-card { cursor: pointer; }

              # ── Notes list ─────────────────────────────────────────────
              - type: markdown
                content: >
                  {% set notes = state_attr('sensor.small_grow_tent_controller_grow_journal','notes') %}
                  {% if not notes or notes | count == 0 %}
                  *No notes yet. Add your first note above.*
                  {% else %}
                  {% for n in notes %}
                  **{{ n.ts }}** — {{ n.text }}
                  {% if not loop.last %}

                  ---
                  {% endif %}
                  {% endfor %}
                  {% endif %}

  # ════════════════════════════════════════════════════════════════
  #  VIEW 2 — TARGETS  (set your goals here)
  # ════════════════════════════════════════════════════════════════
  - title: Targets
    path: grow-tent-targets
    icon: mdi:target
    cards:
      - type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: 1fr 1fr 1fr
          grid-template-areas: |
            "conflict conflict conflict"
            "vpdt     tempt    rht     "
            "ramp     limits   light   "
          grid-column-gap: 12px
          grid-row-gap: 12px
          grid-auto-rows: auto
        cards:

          # ── Conflict warning (hidden when no conflict) ────────────
          - type: conditional
            view_layout:
              grid-area: conflict
            conditions:
              - condition: numeric_state
                entity: sensor.small_grow_tent_controller_target_conflict
                above: 15
            card:
              type: custom:mushroom-template-card
              primary: "Target Conflict — VPD too low"
              secondary: >
                Your Temp + RH targets imply
                {{ states('sensor.small_grow_tent_controller_target_vpd_implied') }} kPa,
                but VPD target is {{ states('number.small_grow_tent_controller_vpd_target') }} kPa.
                Try setting Target RH to ~{{ states('sensor.small_grow_tent_controller_target_implied_rh') }}%.
              icon: mdi:alert-circle-outline
              icon_color: orange
              layout: horizontal

          - type: conditional
            view_layout:
              grid-area: conflict
            conditions:
              - condition: numeric_state
                entity: sensor.small_grow_tent_controller_target_conflict
                below: -15
            card:
              type: custom:mushroom-template-card
              primary: "Target Conflict — VPD too high"
              secondary: >
                Your Temp + RH targets imply
                {{ states('sensor.small_grow_tent_controller_target_vpd_implied') }} kPa,
                but VPD target is {{ states('number.small_grow_tent_controller_vpd_target') }} kPa.
                Try setting Target RH to ~{{ states('sensor.small_grow_tent_controller_target_implied_rh') }}%.
              icon: mdi:alert-circle-outline
              icon_color: orange
              layout: horizontal

          # ── VPD Target ────────────────────────────────────────────
          - type: vertical-stack
            view_layout:
              grid-area: vpdt
            cards:
              - type: custom:mushroom-title-card
                title: VPD Target
                subtitle: Master chase value
                alignment: center
              - type: custom:mushroom-entity-card
                entity: switch.small_grow_tent_controller_vpd_chase
                name: VPD Chase
                icon: mdi:chart-bubble
                tap_action:
                  action: toggle
                fill_container: true
              - type: custom:mushroom-number-card
                entity: number.small_grow_tent_controller_vpd_target
                name: VPD Target (kPa)
                icon: mdi:gauge
                display_mode: buttons
                fill_container: true
                card_mod:
                  style: >
                    ha-card { padding-top: 4px !important; padding-bottom: 4px !important; }

          # ── Temperature Target ────────────────────────────────────
          - type: vertical-stack
            view_layout:
              grid-area: tempt
            cards:
              - type: custom:mushroom-title-card
                title: Temperature Target
                subtitle: Temperature the controller chases during VPD chase
                alignment: center
              - type: custom:mushroom-number-card
                entity: number.small_grow_tent_controller_target_temperature
                name: Target Temp (°C)
                icon: mdi:thermometer
                display_mode: buttons
                fill_container: true
                card_mod:
                  style: >
                    ha-card { padding-top: 4px !important; padding-bottom: 4px !important; }

          # ── Humidity Target ───────────────────────────────────────
          - type: vertical-stack
            view_layout:
              grid-area: rht
            cards:
              - type: custom:mushroom-title-card
                title: Humidity Target
                subtitle: Used in standard VPD chase mode
                alignment: center
              - type: custom:mushroom-number-card
                entity: number.small_grow_tent_controller_target_humidity
                name: Target RH (%)
                icon: mdi:water-percent
                display_mode: buttons
                fill_container: true
                card_mod:
                  style: >
                    ha-card { padding-top: 4px !important; padding-bottom: 4px !important; }

          # ── Ramp limits ───────────────────────────────────────────
          - type: vertical-stack
            view_layout:
              grid-area: ramp
            cards:
              - type: custom:mushroom-title-card
                title: Safety Tuning
                subtitle: Anti-cycling + dew-point protection
                alignment: center
              - type: custom:mushroom-number-card
                entity: number.leaf_temp_offset
                name: Leaf Temp Offset (°C)
                icon: mdi:leaf
                display_mode: buttons
                fill_container: true
                card_mod:
                  style: >
                    ha-card { padding-top: 4px !important; padding-bottom: 4px !important; }
              - type: custom:mushroom-number-card
                entity: number.vpd_deadband
                name: VPD Deadband (kPa)
                icon: mdi:arrow-expand-vertical
                display_mode: buttons
                fill_container: true
                card_mod:
                  style: >
                    ha-card { padding-top: 4px !important; padding-bottom: 4px !important; }
              - type: custom:mushroom-number-card
                entity: number.dew_point_margin
                name: Dew-point Margin (°C)
                icon: mdi:weather-fog
                display_mode: buttons
                fill_container: true
                card_mod:
                  style: >
                    ha-card { padding-top: 4px !important; padding-bottom: 4px !important; }

          # ── Hard Limits ───────────────────────────────────────────
          - type: vertical-stack
            view_layout:
              grid-area: limits
            cards:
              - type: custom:mushroom-title-card
                title: Hard Limits
                subtitle: Controller reacts immediately when breached
                alignment: center
              - type: custom:mushroom-number-card
                entity: number.min_temperature
                name: Min Temp (°C)
                icon: mdi:thermometer-low
                display_mode: buttons
                fill_container: true
                card_mod:
                  style: >
                    ha-card { padding-top: 4px !important; padding-bottom: 4px !important; }
              - type: custom:mushroom-number-card
                entity: number.max_temperature
                name: Max Temp (°C)
                icon: mdi:thermometer-high
                display_mode: buttons
                fill_container: true
                card_mod:
                  style: >
                    ha-card { padding-top: 4px !important; padding-bottom: 4px !important; }
              - type: custom:mushroom-number-card
                entity: number.min_humidity
                name: Min RH (%)
                icon: mdi:water-minus
                display_mode: buttons
                fill_container: true
                card_mod:
                  style: >
                    ha-card { padding-top: 4px !important; padding-bottom: 4px !important; }
              - type: custom:mushroom-number-card
                entity: number.max_humidity
                name: Max RH (%)
                icon: mdi:water-plus
                display_mode: buttons
                fill_container: true
                card_mod:
                  style: >
                    ha-card { padding-top: 4px !important; padding-bottom: 4px !important; }

          # ── Light Schedule ────────────────────────────────────────
          - type: vertical-stack
            view_layout:
              grid-area: light
            cards:
              - type: custom:mushroom-title-card
                title: Light Schedule
                subtitle: Day / night window
                alignment: center
              - type: custom:mushroom-entity-card
                entity: select.stage
                name: Stage
                icon: mdi:sprout
                fill_container: true
              - type: conditional
                conditions:
                  - entity: binary_sensor.use_light_control
                    state: 'on'
                card:
                  type: custom:mushroom-entity-card
                  entity: time.light_on_time
                  name: Lights On
                  icon: mdi:weather-sunny
                  fill_container: true
              - type: conditional
                conditions:
                  - entity: binary_sensor.use_light_control
                    state: 'on'
                card:
                  type: custom:mushroom-entity-card
                  entity: time.light_off_time
                  name: Lights Off
                  icon: mdi:weather-night
                  fill_container: true

  # ════════════════════════════════════════════════════════════════
  #  VIEW 3 — DEVICES  (manual overrides, rarely needed)
  # ════════════════════════════════════════════════════════════════
  - title: Devices
    path: grow-tent-devices
    icon: mdi:electric-switch
    cards:
      - type: custom:mushroom-entity-card
        entity: button.return_all_devices_to_auto
        name: Return All Devices to Auto
        icon: mdi:backup-restore
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.return_all_devices_to_auto
      - type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: 1fr 1fr 1fr
          grid-column-gap: 12px
          grid-row-gap: 12px
          grid-auto-rows: auto
        cards:
          - type: conditional
            conditions:
              - entity: binary_sensor.use_light_control
                state: 'on'
            card:
              type: vertical-stack
              cards:
                - type: custom:mushroom-title-card
                  title: Grow Light
                  alignment: center
                - type: custom:mushroom-entity-card
                  entity: switch.lightgrowtent
                  name: Switch
                  icon: mdi:lightbulb-on-10
                  tap_action:
                    action: toggle
                  fill_container: true
                - type: custom:mushroom-select-card
                  entity: select.light_mode
                  name: Mode
                  icon: mdi:tune-variant
                  fill_container: true
          - type: conditional
            conditions:
              - entity: binary_sensor.use_heater_control
                state: 'on'
            card:
              type: vertical-stack
              cards:
                - type: custom:mushroom-title-card
                  title: Heater
                  alignment: center
                - type: custom:mushroom-entity-card
                  entity: switch.heatergrowtent
                  name: Switch
                  icon: mdi:radiator
                  tap_action:
                    action: toggle
                  fill_container: true
                - type: custom:mushroom-select-card
                  entity: select.heater_mode
                  name: Mode
                  icon: mdi:tune-variant
                  fill_container: true
                - type: custom:mushroom-number-card
                  entity: number.heater_max_run_time
                  name: Max Run (s)
                  icon: mdi:timer-outline
                  display_mode: buttons
                  fill_container: true
                  card_mod:
                    style: >
                      ha-card { padding-top: 4px !important; padding-bottom: 4px !important; }
                - type: custom:mushroom-number-card
                  entity: number.heater_hold_time
                  name: Hold Time (s)
                  icon: mdi:timer-pause
                  display_mode: buttons
                  fill_container: true
                  card_mod:
                    style: >
                      ha-card { padding-top: 4px !important; padding-bottom: 4px !important; }
          - type: conditional
            conditions:
              - entity: binary_sensor.use_circulation_fan_control
                state: 'on'
            card:
              type: vertical-stack
              cards:
                - type: custom:mushroom-title-card
                  title: Circulation Fan
                  alignment: center
                - type: custom:mushroom-entity-card
                  entity: switch.circulationgrowtent
                  name: Switch
                  icon: mdi:fan
                  tap_action:
                    action: toggle
                  fill_container: true
                - type: custom:mushroom-select-card
                  entity: select.circulation_mode
                  name: Mode
                  icon: mdi:tune-variant
                  fill_container: true
          - type: conditional
            conditions:
              - entity: binary_sensor.use_exhaust_fan_control
                state: 'on'
            card:
              type: vertical-stack
              cards:
                - type: custom:mushroom-title-card
                  title: Exhaust Fan
                  alignment: center
                - type: custom:mushroom-entity-card
                  entity: switch.exhaustgrowtent
                  name: Switch
                  icon: mdi:fan-chevron-up
                  tap_action:
                    action: toggle
                  fill_container: true
                - type: custom:mushroom-select-card
                  entity: select.exhaust_mode
                  name: Mode
                  icon: mdi:tune-variant
                  fill_container: true
                - type: custom:mushroom-number-card
                  entity: number.exhaust_hold_time
                  name: Hold Time (s)
                  icon: mdi:timer-pause
                  display_mode: buttons
                  fill_container: true
                  card_mod:
                    style: >
                      ha-card { padding-top: 4px !important; padding-bottom: 4px !important; }
                - type: entities
                  entities:
                    - type: custom:fold-entity-row
                      head:
                        type: section
                        label: Safety Override
                      entities:
                        - entity: switch.exhaust_safety_override
                          name: Override Active
                        - entity: number.exhaust_safety_max_temperature
                          name: Max Temp (°C)
                        - entity: number.exhaust_safety_max_humidity
                          name: Max RH (%)
          - type: conditional
            conditions:
              - entity: binary_sensor.use_humidifier_control
                state: 'on'
            card:
              type: vertical-stack
              cards:
                - type: custom:mushroom-title-card
                  title: Humidifier
                  alignment: center
                - type: custom:mushroom-entity-card
                  entity: switch.humidifiergrowtent
                  name: Switch
                  icon: mdi:air-humidifier
                  tap_action:
                    action: toggle
                  fill_container: true
                - type: custom:mushroom-select-card
                  entity: select.humidifier_mode
                  name: Mode
                  icon: mdi:tune-variant
                  fill_container: true
                - type: custom:mushroom-number-card
                  entity: number.humidifier_hold_time
                  name: Hold Time (s)
                  icon: mdi:timer-pause
                  display_mode: buttons
                  fill_container: true
                  card_mod:
                    style: >
                      ha-card { padding-top: 4px !important; padding-bottom: 4px !important; }
          - type: conditional
            conditions:
              - entity: binary_sensor.use_dehumidifier_control
                state: 'on'
            card:
              type: vertical-stack
              cards:
                - type: custom:mushroom-title-card
                  title: Dehumidifier
                  alignment: center
                - type: custom:mushroom-entity-card
                  entity: switch.dehumidifiergrowtent
                  name: Switch
                  icon: mdi:water-off
                  tap_action:
                    action: toggle
                  fill_container: true
