# Small Grow Tent Controller — Single-view dashboard (dashboard.yaml)
# Requires: layout-card, Mushroom cards, card-mod, fold-entity-row
#
# JOURNAL SETUP: Before using the journal section, create a Text helper in HA:
#   Settings → Helpers → Add Helper → Text
#   Name: Grow Note Input  (entity_id will become input_text.grow_note_input)
---
title: Grow Tent
views:
  - title: Controller
    path: grow-tent
    icon: mdi:sprout
    cards:
      - type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: 1fr 1fr 1fr
          grid-template-areas: |
            "small   calc    env   "
            "tuning  devtgt  limits"
            "cycle   cycle   cycle "
            "temp    rh      vpd   "
            "debug   debug   debug "
          grid-column-gap: 12px
          grid-row-gap: 12px
          grid-auto-rows: minmax(160px, auto)
        cards:
          - type: vertical-stack
            view_layout:
              grid-area: small
            cards:
              - type: custom:mushroom-title-card
                title: Grow Tent
                subtitle: >
                  {% set upd = 'update.small_grow_tent_controller_update' %} {%
                  set inst = state_attr(upd,'installed_version') %} {% set lat 
                  = state_attr(upd,'latest_version') %} {% set upd_avail = inst
                  and lat and inst != lat %} Grow Tent Controller {%- if inst
                  -%}({{ inst }}{%- if upd_avail -%} -> {{ lat }}{%- endif
                  -%}){%- endif -%} {%- if upd_avail -%} - UPDATE AVAILABLE{%-
                  endif -%}
                alignment: center
                tap_action:
                  action: url
                  url_path: >-
                    https://github.com/ferreirajcsf/small-grow-tent-controller/releases/latest
                hold_action:
                  action: more-info
                  entity: update.small_grow_tent_controller_update
              - type: custom:layout-card
                layout_type: grid
                layout:
                  grid-template-columns: repeat(2, 1fr)
                  grid-auto-rows: 100px
                  grid-column-gap: 8px
                  grid-row-gap: 8px
                cards:
                  - type: custom:mushroom-template-card
                    entity: sensor.control_mode
                    primary: Controller
                    secondary: >
                      {% set m = states('sensor.control_mode') %} {% set map = {
                        'disabled':'Disabled','waiting_for_sensors':'Waiting...','init':'Starting...',
                        'vpd_chase':'VPD chase',
                        'drying_hard_limits_only':'Drying (in band)','limits_only':'Limits only',
                        'safety_trip:heater_max_run':'Safety: Heater max run',
                        'night_on_dewpoint_protect':'Night: Dew (ON)',
                        'night_auto_dewpoint_protect':'Night: Dew (AUTO)',
                        'night_vpd_chase':'Night: VPD Chase',
                        'hard_limit:temp_below_min':'Limit: Temp low','hard_limit:temp_above_max':'Limit: Temp high',
                        'hard_limit:rh_below_min':'Limit: RH low','hard_limit:rh_above_max':'Limit: RH high',
                        'drying_hard_limit:temp_below_min':'Dry: Temp low','drying_hard_limit:temp_above_max':'Dry: Temp high',
                        'drying_hard_limit:rh_below_min':'Dry: RH low','drying_hard_limit:rh_above_max':'Dry: RH high'
                      } %} {{ map.get(m, m | replace('_',' ')) }} - {{ 'ON' if
                      is_state('switch.controller','on') else 'OFF' }}
                    icon: >
                      {% set m = states('sensor.control_mode') %} {% if m ==
                      'vpd_chase' %} mdi:chart-bell-curve-cumulative {% elif m
                      in ['disabled','waiting_for_sensors','init'] %}
                      mdi:clock-outline {% elif m.startswith('night_') %}
                      mdi:weather-night {% elif 'temp' in m and ('limit' in m or
                      'hard' in m) %} mdi:thermometer-alert {% elif 'rh' in m
                      and ('limit' in m or 'hard' in m) %} mdi:water-alert {%
                      elif m.startswith('safety_trip:') %} mdi:alert-octagon {%
                      elif m.startswith('drying_') %} mdi:hair-dryer {% else %}
                      mdi:robot {% endif %}
                    icon_color: >
                      {% set m = states('sensor.control_mode') %} {% if m ==
                      'vpd_chase' %} green {% elif 'hard_limit' in m or
                      'safety_trip' in m %} red {% elif m.startswith('night_')
                      %} blue {% elif m == 'drying_hard_limits_only' %} amber {%
                      else %} grey {% endif %}
                    fill_container: true
                    tap_action:
                      action: call-service
                      service: switch.toggle
                      target:
                        entity_id: switch.controller
                    hold_action:
                      action: more-info
                      entity: sensor.control_mode
                  - type: custom:mushroom-entity-card
                    entity: select.stage
                    name: Stage
                    icon: mdi:sprout
                    fill_container: true
                  - type: custom:mushroom-entity-card
                    entity: switch.small_grow_tent_controller_vpd_chase
                    name: VPD Chase
                    icon: mdi:chart-bubble
                    tap_action:
                      action: toggle
                    fill_container: true
          - type: vertical-stack
            view_layout:
              grid-area: calc
            cards:
              - type: custom:mushroom-title-card
                title: Calculations
                subtitle: Averages + VPD
                alignment: center
              - type: custom:layout-card
                layout_type: grid
                layout:
                  grid-template-columns: repeat(2, 1fr)
                  grid-auto-rows: 100px
                  grid-column-gap: 8px
                  grid-row-gap: 8px
                cards:
                  - type: custom:mushroom-entity-card
                    entity: sensor.average_temperature
                    name: Avg Temp
                    icon: mdi:thermometer
                    fill_container: true
                  - type: custom:mushroom-entity-card
                    entity: sensor.average_humidity
                    name: Avg RH
                    icon: mdi:water-percent
                    fill_container: true
                  - type: custom:mushroom-entity-card
                    entity: sensor.vpd
                    name: VPD
                    icon: mdi:chart-bell-curve-cumulative
                    fill_container: true
                  - type: custom:mushroom-entity-card
                    entity: sensor.dew_point
                    name: Dew Point
                    icon: mdi:weather-fog
                    fill_container: true
          - type: vertical-stack
            view_layout:
              grid-area: env
            cards:
              - type: custom:mushroom-title-card
                title: Environment
                subtitle: Raw sensor readings
                alignment: center
              - type: custom:layout-card
                layout_type: grid
                layout:
                  grid-template-columns: repeat(2, 1fr)
                  grid-auto-rows: 100px
                  grid-column-gap: 8px
                  grid-row-gap: 8px
                cards:
                  - type: custom:mushroom-entity-card
                    entity: sensor.canopy_temperature
                    name: Canopy Temp
                    icon: mdi:thermometer
                    fill_container: true
                  - type: custom:mushroom-entity-card
                    entity: sensor.top_temperature
                    name: Top Temp
                    icon: mdi:thermometer
                    fill_container: true
                  - type: custom:mushroom-entity-card
                    entity: sensor.canopy_humidity
                    name: Canopy RH
                    icon: mdi:water-percent
                    fill_container: true
                  - type: custom:mushroom-entity-card
                    entity: sensor.top_humidity
                    name: Top RH
                    icon: mdi:water-percent
                    fill_container: true
          - type: vertical-stack
            view_layout:
              grid-area: tuning
            cards:
              - type: custom:mushroom-title-card
                title: Tuning / Safety
                subtitle: Anti-cycling + dew-point protection
                alignment: center
              - type: custom:layout-card
                layout_type: grid
                layout:
                  grid-template-columns: repeat(2, 1fr)
                  grid-auto-rows: 100px
                  grid-column-gap: 8px
                  grid-row-gap: 8px
                cards:
                  - type: custom:mushroom-number-card
                    entity: number.leaf_temp_offset
                    name: Leaf Offset
                    icon: mdi:leaf
                    display_mode: buttons
                    fill_container: true
                    card_mod:
                      style: >
                        ha-card { padding-top: 4px !important; padding-bottom:
                        4px !important; }
                  - type: custom:mushroom-number-card
                    entity: number.vpd_deadband
                    name: VPD Deadband
                    icon: mdi:arrow-expand-vertical
                    display_mode: buttons
                    fill_container: true
                    card_mod:
                      style: >
                        ha-card { padding-top: 4px !important; padding-bottom:
                        4px !important; }
                  - type: custom:mushroom-number-card
                    entity: number.dew_point_margin
                    name: Dew Margin
                    icon: mdi:weather-fog
                    display_mode: buttons
                    fill_container: true
                    card_mod:
                      style: >
                        ha-card { padding-top: 4px !important; padding-bottom:
                        4px !important; }
                  - type: custom:mushroom-select-card
                    entity: select.small_grow_tent_controller_night_mode
                    name: Night Mode
                    icon: mdi:weather-night
                    fill_container: true
                  - type: conditional
                    conditions:
                      - entity: binary_sensor.use_exhaust_fan_control
                        state: 'on'
                    card:
                      type: custom:mushroom-number-card
                      entity: number.exhaust_hold_time
                      name: Exhaust Hold (s)
                      icon: mdi:fan-chevron-up
                      display_mode: buttons
                      fill_container: true
                      card_mod:
                        style: >
                          ha-card { padding-top: 4px !important; padding-bottom:
                          4px !important; }
                  - type: conditional
                    conditions:
                      - entity: binary_sensor.use_heater_control
                        state: 'on'
                    card:
                      type: custom:mushroom-number-card
                      entity: number.heater_max_run_time
                      name: Heater Max Run (s)
                      icon: mdi:timer-outline
                      display_mode: buttons
                      fill_container: true
                      card_mod:
                        style: >
                          ha-card { padding-top: 4px !important; padding-bottom:
                          4px !important; }
                  - type: conditional
                    conditions:
                      - entity: binary_sensor.use_heater_control
                        state: 'on'
                    card:
                      type: custom:mushroom-number-card
                      entity: number.heater_hold_time
                      name: Heater Hold (s)
                      icon: mdi:radiator
                      display_mode: buttons
                      fill_container: true
                      card_mod:
                        style: >
                          ha-card { padding-top: 4px !important; padding-bottom:
                          4px !important; }
                  - type: conditional
                    conditions:
                      - entity: binary_sensor.use_humidifier_control
                        state: 'on'
                    card:
                      type: custom:mushroom-number-card
                      entity: number.humidifier_hold_time
                      name: Humidifier Hold (s)
                      icon: mdi:air-humidifier
                      display_mode: buttons
                      fill_container: true
                      card_mod:
                        style: >
                          ha-card { padding-top: 4px !important; padding-bottom:
                          4px !important; }
                  - type: conditional
                    conditions:
                      - entity: binary_sensor.use_dehumidifier_control
                        state: 'on'
                    card:
                      type: custom:mushroom-number-card
                      entity: number.dehumidifier_hold_time
                      name: Dehumidifier Hold (s)
                      icon: mdi:water-off
                      display_mode: buttons
                      fill_container: true
                      card_mod:
                        style: >
                          ha-card { padding-top: 4px !important; padding-bottom:
                          4px !important; }
          - type: vertical-stack
            view_layout:
              grid-area: devtgt
            cards:
              - type: custom:mushroom-title-card
                title: Targets
                subtitle: VPD chase goals -- controller works toward these values
                alignment: center

              # ── VPD Congruence card ────────────────────────────────────────
              # Shows whether Target Temp + Target RH are mutually consistent
              # with the VPD Target, using the same implied-VPD sensors the
              # controller exposes.  Green = all three values agree; orange =
              # conflict detected with a suggested fix.
              - type: custom:mushroom-template-card
                primary: >
                  {% set diff = states('sensor.small_grow_tent_controller_target_conflict') | float(0) %}
                  {% if diff | abs <= 15 %}
                  ✅ Targets are congruent
                  {% elif diff > 15 %}
                  ⚠️ Conflict — implied VPD too low
                  {% else %}
                  ⚠️ Conflict — implied VPD too high
                  {% endif %}
                secondary: >
                  {% set vpd_t  = states('number.small_grow_tent_controller_vpd_target') %}
                  {% set vpd_i  = states('sensor.small_grow_tent_controller_target_vpd_implied') %}
                  {% set rh_fix = states('sensor.small_grow_tent_controller_target_implied_rh') %}
                  {% set diff   = states('sensor.small_grow_tent_controller_target_conflict') | float(0) %}
                  VPD target {{ vpd_t }} kPa · implied {{ vpd_i }} kPa
                  {%- if diff | abs > 15 %} · try RH ≈ {{ rh_fix }}%{% endif %}
                icon: >
                  {% set diff = states('sensor.small_grow_tent_controller_target_conflict') | float(0) %}
                  {% if diff | abs <= 15 %}
                  mdi:check-circle-outline
                  {% else %}
                  mdi:alert-circle-outline
                  {% endif %}
                icon_color: >
                  {% set diff = states('sensor.small_grow_tent_controller_target_conflict') | float(0) %}
                  {% if diff | abs <= 15 %}green{% else %}orange{% endif %}
                fill_container: true
              # ── end VPD Congruence card ────────────────────────────────────

              - type: conditional
                conditions:
                  - condition: numeric_state
                    entity: sensor.small_grow_tent_controller_target_conflict
                    above: 15
                card:
                  type: custom:mushroom-template-card
                  primary: Target Conflict -- VPD too low
                  secondary: >
                    Temp + RH imply {{
                    states('sensor.small_grow_tent_controller_target_vpd_implied')
                    }} kPa, target is {{
                    states('number.small_grow_tent_controller_vpd_target') }}
                    kPa. Try RH ~{{
                    states('sensor.small_grow_tent_controller_target_implied_rh')
                    }}%.
                  icon: mdi:alert-circle-outline
                  icon_color: orange
              - type: conditional
                conditions:
                  - condition: numeric_state
                    entity: sensor.small_grow_tent_controller_target_conflict
                    below: -15
                card:
                  type: custom:mushroom-template-card
                  primary: Target Conflict -- VPD too high
                  secondary: >
                    Temp + RH imply {{
                    states('sensor.small_grow_tent_controller_target_vpd_implied')
                    }} kPa, target is {{
                    states('number.small_grow_tent_controller_vpd_target') }}
                    kPa. Try RH ~{{
                    states('sensor.small_grow_tent_controller_target_implied_rh')
                    }}%.
                  icon: mdi:alert-circle-outline
                  icon_color: orange
              - type: custom:layout-card
                layout_type: grid
                layout:
                  grid-template-columns: repeat(2, 1fr)
                  grid-auto-rows: 100px
                  grid-column-gap: 8px
                  grid-row-gap: 8px
                cards:
                  - type: custom:mushroom-number-card
                    entity: number.small_grow_tent_controller_vpd_target
                    name: VPD Target
                    icon: mdi:gauge
                    display_mode: buttons
                    fill_container: true
                    card_mod:
                      style: >
                        ha-card { padding-top: 4px !important; padding-bottom:
                        4px !important; }
                  - type: custom:mushroom-number-card
                    entity: number.small_grow_tent_controller_target_temperature
                    name: Target Temp
                    icon: mdi:thermometer
                    display_mode: buttons
                    fill_container: true
                    card_mod:
                      style: >
                        ha-card { padding-top: 4px !important; padding-bottom:
                        4px !important; }
                  - type: custom:mushroom-number-card
                    entity: number.small_grow_tent_controller_target_humidity
                    name: Target RH
                    icon: mdi:water-percent
                    display_mode: buttons
                    fill_container: true
                    card_mod:
                      style: >
                        ha-card { padding-top: 4px !important; padding-bottom:
                        4px !important; }
              - type: custom:mushroom-title-card
                title: Devices
                subtitle: Controls + mode overrides
                alignment: center
              - type: custom:layout-card
                layout_type: grid
                layout:
                  grid-template-columns: repeat(2, 1fr)
                  grid-auto-rows: auto
                  grid-column-gap: 8px
                  grid-row-gap: 8px
                cards:
                  - type: custom:mushroom-entity-card
                    entity: button.return_all_devices_to_auto
                    name: Return All to Auto
                    icon: mdi:backup-restore
                    tap_action:
                      action: call-service
                      service: button.press
                      target:
                        entity_id: button.return_all_devices_to_auto
                    fill_container: true
                  - type: conditional
                    conditions:
                      - entity: binary_sensor.use_light_control
                        state: 'on'
                    card:
                      type: vertical-stack
                      cards:
                        - type: custom:mushroom-entity-card
                          entity: switch.lightgrowtent
                          name: Grow Light
                          icon: mdi:lightbulb-on-10
                          tap_action:
                            action: toggle
                          fill_container: true
                        - type: custom:mushroom-select-card
                          entity: select.light_mode
                          name: Mode
                          icon: mdi:tune-variant
                          fill_container: true
                  - type: conditional
                    conditions:
                      - entity: binary_sensor.use_heater_control
                        state: 'on'
                    card:
                      type: vertical-stack
                      cards:
                        - type: custom:mushroom-entity-card
                          entity: switch.heatergrowtent
                          name: Heater
                          icon: mdi:radiator
                          tap_action:
                            action: toggle
                          fill_container: true
                        - type: custom:mushroom-select-card
                          entity: select.heater_mode
                          name: Mode
                          icon: mdi:tune-variant
                          fill_container: true
                  - type: conditional
                    conditions:
                      - entity: binary_sensor.use_circulation_fan_control
                        state: 'on'
                    card:
                      type: vertical-stack
                      cards:
                        - type: custom:mushroom-entity-card
                          entity: switch.circulationgrowtent
                          name: Circulation Fan
                          icon: mdi:fan
                          tap_action:
                            action: toggle
                          fill_container: true
                        - type: custom:mushroom-select-card
                          entity: select.circulation_mode
                          name: Mode
                          icon: mdi:tune-variant
                          fill_container: true
                  - type: conditional
                    conditions:
                      - entity: binary_sensor.use_exhaust_fan_control
                        state: 'on'
                    card:
                      type: vertical-stack
                      cards:
                        - type: custom:mushroom-entity-card
                          entity: switch.exhaustgrowtent
                          name: Exhaust Fan
                          icon: mdi:fan-chevron-up
                          tap_action:
                            action: toggle
                          fill_container: true
                        - type: custom:mushroom-select-card
                          entity: select.exhaust_mode
                          name: Mode
                          icon: mdi:tune-variant
                          fill_container: true
                        - type: entities
                          entities:
                            - type: custom:fold-entity-row
                              head:
                                type: section
                                label: Exhaust Safety
                              entities:
                                - entity: switch.exhaust_safety_override
                                  name: Safety Override
                                - entity: number.exhaust_safety_max_temperature
                                  name: Max Temp (C)
                                - entity: number.exhaust_safety_max_humidity
                                  name: Max RH (%)
                  - type: conditional
                    conditions:
                      - entity: binary_sensor.use_humidifier_control
                        state: 'on'
                    card:
                      type: vertical-stack
                      cards:
                        - type: custom:mushroom-entity-card
                          entity: switch.humidifiergrowtent
                          name: Humidifier
                          icon: mdi:air-humidifier
                          tap_action:
                            action: toggle
                          fill_container: true
                        - type: custom:mushroom-select-card
                          entity: select.humidifier_mode
                          name: Mode
                          icon: mdi:tune-variant
                          fill_container: true
                  - type: conditional
                    conditions:
                      - entity: binary_sensor.use_dehumidifier_control
                        state: 'on'
                    card:
                      type: vertical-stack
                      cards:
                        - type: custom:mushroom-entity-card
                          entity: switch.dehumidifiergrowtent
                          name: Dehumidifier
                          icon: mdi:water-off
                          tap_action:
                            action: toggle
                          fill_container: true
                        - type: custom:mushroom-select-card
                          entity: select.dehumidifier_mode
                          name: Mode
                          icon: mdi:tune-variant
                          fill_container: true
          - type: vertical-stack
            view_layout:
              grid-area: limits
            cards:
              - type: custom:mushroom-title-card
                title: Limits
                subtitle: Hard stops
                alignment: center
              - type: custom:layout-card
                layout_type: grid
                layout:
                  grid-template-columns: repeat(2, 1fr)
                  grid-auto-rows: 100px
                  grid-column-gap: 8px
                  grid-row-gap: 8px
                cards:
                  - type: custom:mushroom-number-card
                    entity: number.min_temperature
                    name: Min Temp
                    icon: mdi:thermometer-low
                    display_mode: buttons
                    fill_container: true
                    card_mod:
                      style: >
                        ha-card { padding-top: 4px !important; padding-bottom:
                        4px !important; }
                  - type: custom:mushroom-number-card
                    entity: number.max_temperature
                    name: Max Temp
                    icon: mdi:thermometer-high
                    display_mode: buttons
                    fill_container: true
                    card_mod:
                      style: >
                        ha-card { padding-top: 4px !important; padding-bottom:
                        4px !important; }
                  - type: custom:mushroom-number-card
                    entity: number.min_humidity
                    name: Min RH
                    icon: mdi:water-minus
                    display_mode: buttons
                    fill_container: true
                    card_mod:
                      style: >
                        ha-card { padding-top: 4px !important; padding-bottom:
                        4px !important; }
                  - type: custom:mushroom-number-card
                    entity: number.max_humidity
                    name: Max RH
                    icon: mdi:water-plus
                    display_mode: buttons
                    fill_container: true
                    card_mod:
                      style: >
                        ha-card { padding-top: 4px !important; padding-bottom:
                        4px !important; }
                  - type: conditional
                    conditions:
                      - entity: binary_sensor.use_light_control
                        state: 'on'
                    card:
                      type: custom:mushroom-entity-card
                      entity: time.light_on_time
                      name: Light On
                      icon: mdi:weather-sunny
                      fill_container: true
                  - type: conditional
                    conditions:
                      - entity: binary_sensor.use_light_control
                        state: 'on'
                    card:
                      type: custom:mushroom-entity-card
                      entity: time.light_off_time
                      name: Light Off
                      icon: mdi:weather-night
                      fill_container: true
          - type: vertical-stack
            view_layout:
              grid-area: cycle
            cards:
              - type: custom:mushroom-title-card
                title: Grow Cycle
                subtitle: Dates + counters
                alignment: center
              - type: custom:layout-card
                layout_type: grid
                layout:
                  grid-template-columns: repeat(6, 1fr)
                  grid-auto-rows: 100px
                  grid-column-gap: 8px
                  grid-row-gap: 8px
                cards:
                  - type: custom:mushroom-entity-card
                    entity: input_datetime.grow_germination_date
                    name: Germination
                    icon: mdi:seed
                    fill_container: true
                  - type: custom:mushroom-number-card
                    entity: input_number.grow_plant_count
                    name: Plants
                    icon: mdi:sprout
                    display_mode: buttons
                    fill_container: true
                  - type: custom:mushroom-entity-card
                    entity: input_datetime.grow_flowering_start_date
                    name: Flower Start
                    icon: mdi:flower-outline
                    fill_container: true
                  - type: custom:mushroom-entity-card
                    entity: sensor.grow_days_since_germination
                    name: Since Germ
                    icon: mdi:timer-sand
                    fill_container: true
                  - type: custom:mushroom-number-card
                    entity: input_number.grow_total_flower_days
                    name: Flower Days
                    icon: mdi:calendar-range
                    display_mode: buttons
                    fill_container: true
                  - type: custom:mushroom-entity-card
                    entity: sensor.grow_days_until_harvest
                    name: To Harvest
                    icon: mdi:calendar-end
                    fill_container: true
              - type: custom:mushroom-title-card
                title: Grow Journal
                subtitle: Timestamped notes for this grow
                alignment: center
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-entity-card
                    entity: sensor.small_grow_tent_controller_grow_journal
                    name: Notes recorded
                    icon: mdi:notebook-edit-outline
                    fill_container: true
                  - type: custom:mushroom-entity-card
                    entity: button.small_grow_tent_controller_clear_last_note
                    name: Clear Last
                    icon: mdi:notebook-minus-outline
                    tap_action:
                      action: call-service
                      service: button.press
                      target:
                        entity_id: button.small_grow_tent_controller_clear_last_note
                    fill_container: true
                  - type: custom:mushroom-entity-card
                    entity: button.small_grow_tent_controller_clear_all_notes
                    name: Clear All
                    icon: mdi:notebook-remove-outline
                    tap_action:
                      action: call-service
                      service: button.press
                      target:
                        entity_id: button.small_grow_tent_controller_clear_all_notes
                    fill_container: true
              - type: horizontal-stack
                cards:
                  - type: entities
                    entities:
                      - entity: input_text.grow_note_input
                        name: New note
                  - type: custom:mushroom-template-card
                    primary: Add Note
                    icon: mdi:plus-circle-outline
                    icon_color: green
                    fill_container: false
                    tap_action:
                      action: call-service
                      service: script.add_grow_note
              - type: markdown
                content: >
                  {% set notes =
                  state_attr('sensor.small_grow_tent_controller_grow_journal','notes')
                  %} {% if not notes or notes | count == 0 %} *No notes yet. Add
                  your first note above.* {% else %} {% for n in notes %} **{{
                  n.ts }}** — {{ n.text }} {% if not loop.last %}

                  --- {% endif %} {% endfor %} {% endif %}
